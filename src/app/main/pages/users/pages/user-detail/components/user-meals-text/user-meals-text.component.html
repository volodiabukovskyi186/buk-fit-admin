<div class="bk-create-user" [formGroup]="formGroup">

  <div class="bk-top-bar">
    <hs-button size="medium" (click)="openMealsDialog()" [text]="'Вибрати шаблон'"></hs-button>
    <hs-button size="medium" (click)="updateUser()" [text]="'Зберегти'"></hs-button>
  </div>

  <!-- Structured meals section -->
  <div class="bk-meals-section">
    <div class="bk-meals-section-header">
      <span class="bk-meals-title">Прийоми їжі</span>
    </div>

    <div formArrayName="meals" class="meals-list">
      <div class="bk-meal-block" *ngFor="let meal of mealsArray.controls; let i = index">
        <div [formGroupName]="i">

          <!-- Compact header: emoji + type select + macro inputs inline -->
          <div class="bk-meal-compact-header"
               [style.border-left-color]="getMealColor(meal.get('type').value)">

            <span class="bk-meal-emoji">{{ getMealEmoji(meal.get('type').value) }}</span>

            <div class="bk-meal-type-select" style="max-height: 45px">
              <hs-form-field class="w-100">
                <hs-select formControlName="type" [dropdownMinWidth]="160">
                  <hs-select-option *ngFor="let opt of MEAL_OPTIONS" [value]="opt.value">
                    {{ opt.label }}
                  </hs-select-option>
                </hs-select>
              </hs-form-field>
            </div>

            <div class="bk-compact-macros">
              <div class="bk-compact-macro">
                <span class="bk-compact-macro-label">Ккал</span>
                <input class="bk-compact-input" formControlName="calories" type="number" placeholder="0" />
              </div>
              <div class="bk-compact-macro">
                <span class="bk-compact-macro-label">Б</span>
                <input class="bk-compact-input" formControlName="protein" type="number" placeholder="0" />
              </div>
              <div class="bk-compact-macro">
                <span class="bk-compact-macro-label">Ж</span>
                <input class="bk-compact-input" formControlName="fat" type="number" placeholder="0" />
              </div>
              <div class="bk-compact-macro">
                <span class="bk-compact-macro-label">В</span>
                <input class="bk-compact-input" formControlName="carbs" type="number" placeholder="0" />
              </div>
            </div>

            <button class="bk-meal-delete" (click)="removeMealBlock(i, $event)" title="Видалити прийом">×</button>
          </div>

          <!-- Content: always visible -->
          <div class="bk-meal-content-body">
            <textarea rows="20" class="bk-meal-textarea" formControlName="content"
              placeholder="Вуглеводи (обери 1):&#10;* гречка 50 г&#10;&#10;Білок (обери 1–2):&#10;* яйця 2 шт"></textarea>
          </div>

        </div>
      </div>
    </div>

    <button class="bk-add-meal-btn" (click)="addMealBlock()">+ Додати прийом їжі</button>
  </div>

  <!-- Legacy text field -->
  <div class="bk-legacy-section">
    <div class="bk-legacy-header">
      <span class="bk-legacy-title">Харчування (текстовий формат)</span>
      <span class="bk-legacy-badge">старий формат</span>
    </div>
    <div class="bk-text-area">
      <textarea formControlName="text"></textarea>
    </div>
  </div>

</div>
