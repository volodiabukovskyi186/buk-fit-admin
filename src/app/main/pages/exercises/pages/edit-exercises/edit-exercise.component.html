
<div class="bk-create-user" [formGroup]="formGroup">
    <div class="flex justify-content-end ">
        <hs-button size="medium" class="mt-14" (click)="updateExercise()" [isDisabled]="isSaving" [text]="isSaving ? 'Збереження...' : 'Оновити вправу'"></hs-button>
   </div>

  <div class="bk-upload-actions">
    <label class="bk-file-picker">
      <input type="file" (change)="onFileSelected($event)" />
      <span>Обрати файл</span>
    </label>
  </div>

  <div class="bk-file-name" *ngIf="selectedFile">
    Вибрано: {{ selectedFile.name }}
  </div>

    <div class="flex bk-two-fields ">
        <hs-form-field class="w-100">
            <hs-label>Назва вправи</hs-label>
            <input iqInput formControlName="name" />
        </hs-form-field>
    </div>

    <div class="bk-text-area">
        <hs-label>Коментар</hs-label>
        <textarea formControlName="comment"> </textarea>
    </div>

  <hs-form-field class="w-100">
    <hs-label>Посилання на TG відео</hs-label>
    <input iqInput formControlName="videoURL"/>
    <i class="hs-icon icon-link hs-pointer" iqSuffix (click)="moveToTGExegesis(exercise?.value?.videoURL)"></i>
  </hs-form-field>

  <hs-form-field class="w-100">
    <hs-label>URL завантаженого відео</hs-label>
    <input iqInput formControlName="url"/>

  </hs-form-field>

  <hs-button color="error" (click)="deleteExercise()" [text]="'Видалити вправу'"></hs-button>

  @if (url.value) {
    <video
      loop
      playsinline
      controls
      style="width:200px; height:400px; object-fit:cover;"
      [src]="url.value">
    </video>
  }
</div>
